<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MongoDB CRUD App</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; }
h2,h3 { color: #444; }
input { margin:5px; padding:8px; border:1px solid #ccc; border-radius:4px; }
button { padding:8px 15px; border:none; border-radius:4px; cursor:pointer; margin-left:5px; font-weight:bold; }
button.add { background:#28a745; color:white; }
button.edit { background:#ffc107; color:white; }
button.delete { background:#dc3545; color:white; }
table { border-collapse: collapse; margin-top:20px; width:100%; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
td,th { border:1px solid #ddd; padding:12px; text-align:left; }
th { background:#007bff; color:white; }
tr:hover { background:#f1f1f1; }
</style>
</head>
<body>

<h2>MongoDB CRUD</h2>

<h3>Add / Update User</h3>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="age" placeholder="Age">
<input type="hidden" id="userId">
<button class="add" onclick="saveUser()">Save</button>

<h3>Users</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Age</th>
<th>Action</th>
</tr>
</thead>
<tbody id="usersTable"></tbody>
</table>

<script>
const API = "http://localhost:3000/users"

// Load all users
async function loadUsers() {
    const res = await fetch(API);
    const data = await res.json();
    const table = document.getElementById("usersTable");
    table.innerHTML = "";

    data.forEach(user => {
        table.innerHTML += `
        <tr>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${user.age}</td>
            <td>
                <button class="edit" onclick="editUser('${user._id}','${user.name}','${user.email}','${user.age}')">Edit</button>
                <button class="delete" onclick="deleteUser('${user._id}')">Delete</button>
            </td>
        </tr>`;
    });
}

// Add or update user
async function saveUser() {
    const id = document.getElementById("userId").value;
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const ageInput = document.getElementById("age").value.trim();

    if (!name || !email || !ageInput) return alert("Please fill all fields");
    
    const age = parseInt(ageInput);
    if (isNaN(age) || age < 0) return alert("Age must be a valid positive number");

    const payload = { name, email, age };

    if (id) {
        await fetch(`${API}/${id}`, { method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    } else {
        await fetch(API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    }

    document.getElementById("userId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("age").value = "";

    loadUsers();
}

// Delete user
async function deleteUser(id) {
    if (!confirm("Are you sure you want to delete this user?")) return;
    await fetch(`${API}/${id}`, { method:"DELETE" });
    loadUsers();
}

// Fill form for editing
function editUser(id, name, email, age) {
    document.getElementById("userId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("email").value = email;
    document.getElementById("age").value = age;
}

// Initial load
loadUsers();
</script>

</body>
</html>
